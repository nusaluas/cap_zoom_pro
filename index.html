<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAP Link Pro - Pure P2P Communication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #1e1b4b, #2e1065);
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        .font-heading { font-family: 'Space Grotesk', sans-serif; }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .neon-border-cyan {
            border: 1px solid rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }

        .video-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            width: 100%;
            height: 100%;
            padding: 1.5rem;
            overflow-y: auto;
            align-items: center;
            justify-content: center;
            align-content: center;
        }

        .video-tile {
            position: relative;
            background: #000;
            border-radius: 1.25rem;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            border: 2px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            flex-grow: 1;
            /* width dan max-width akan diatur dinamis lewat JS */
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-label {
            position: absolute;
            bottom: 0.75rem;
            left: 0.75rem;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.35rem 0.85rem;
            border-radius: 0.75rem;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 10;
        }

        .hand-indicator {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: #facc15;
            color: #1e1b4b;
            padding: 0.5rem;
            border-radius: 50%;
            box-shadow: 0 0 15px #facc15;
            z-index: 15;
            display: none;
        }

        .animate-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pop {
            from { opacity: 0; transform: scale(0.85); }
            to { opacity: 1; transform: scale(1); }
        }

        #chat-panel {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }

        #chat-panel.active {
            transform: translateX(0);
        }
    </style>
</head>
<body>

    <div class="flex h-screen max-w-[1600px] mx-auto w-full p-4 md:p-6 overflow-hidden">
        <!-- Main Container -->
        <div class="flex-1 flex flex-col min-w-0">
            <!-- Header -->
            <header class="flex-shrink-0 flex items-center justify-between mb-6">
                <div class="flex items-center space-x-4">
                    <div class="p-2 glass-morphism rounded-xl neon-border-cyan">
                        <img src="https://smartcap.or.id/assets/logo.png" alt="CAP" class="h-8 w-auto filter brightness-0 invert" onerror="this.style.display='none'">
                    </div>
                    <h1 class="text-2xl font-black font-heading bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-fuchsia-500">
                        CAP Link Pro
                    </h1>
                </div>
                <div id="connection-status" class="hidden glass-morphism px-4 py-2 rounded-xl border border-emerald-500/30 flex items-center space-x-3">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
                    <span id="status-text" class="text-[10px] font-black text-emerald-400 uppercase tracking-widest">Sistem Aktif</span>
                </div>
            </header>

            <div class="flex-1 flex flex-col lg:flex-row gap-6 min-h-0">
                <!-- Sidebar: Kontrol -->
                <div class="lg:w-80 flex flex-col space-y-4 flex-shrink-0">
                    <div class="glass-morphism p-6 rounded-[2rem] border-t border-white/10">
                        <h2 class="text-[10px] font-black text-cyan-400 uppercase tracking-[0.4em] mb-4">Konfigurasi Node</h2>
                        
                        <div class="space-y-4">
                            <div id="init-form" class="space-y-4">
                                <!-- Mode Selector -->
                                <div class="flex space-x-2 border-b border-white/10 pb-2 mb-4">
                                    <button id="btn-tab-user" onclick="setMode('user')" class="flex-1 text-cyan-400 border-b-2 border-cyan-500 pb-1 text-[10px] font-bold uppercase tracking-widest transition-colors">Gabung</button>
                                    <button id="btn-tab-admin" onclick="promptAdmin()" class="flex-1 text-slate-500 border-b-2 border-transparent pb-1 text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-1 transition-colors hover:text-white"><i data-lucide="lock" class="w-3 h-3"></i> Admin</button>
                                </div>

                                <!-- User Form -->
                                <div id="user-form" class="space-y-4">
                                    <div>
                                        <label class="text-[9px] text-slate-500 uppercase mb-1 block">Nama Anda</label>
                                        <input type="text" id="user-name" placeholder="Contoh: Budi" class="w-full bg-black/20 text-white text-sm p-3 rounded-xl border border-white/10 focus:outline-none focus:border-cyan-500/50">
                                    </div>
                                    <div>
                                        <label class="text-[9px] text-slate-500 uppercase mb-1 block">ID Ruang (Admin)</label>
                                        <input type="text" id="room-id" placeholder="Masukkan ID Ruang..." class="w-full bg-black/20 text-white text-sm p-3 rounded-xl border border-white/10 focus:outline-none focus:border-cyan-500/50">
                                    </div>
                                    <button onclick="joinRoom()" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Gabung Ruang</button>
                                </div>

                                <!-- Admin Form -->
                                <div id="admin-form" class="space-y-4 hidden">
                                    <div>
                                        <label class="text-[9px] text-fuchsia-400 uppercase mb-1 block">Nama Admin</label>
                                        <input type="text" id="admin-name" placeholder="Contoh: Pak Bos" class="w-full bg-fuchsia-900/20 text-fuchsia-100 text-sm p-3 rounded-xl border border-fuchsia-500/30 focus:outline-none focus:border-fuchsia-500">
                                    </div>
                                    <div>
                                        <label class="text-[9px] text-fuchsia-400 uppercase mb-1 block">Buat ID Ruang</label>
                                        <input type="text" id="admin-room-id" placeholder="Contoh: MEETING-01" class="w-full bg-fuchsia-900/20 text-fuchsia-100 text-sm p-3 rounded-xl border border-fuchsia-500/30 focus:outline-none focus:border-fuchsia-500">
                                    </div>
                                    <button onclick="createRoom()" class="w-full bg-gradient-to-r from-fuchsia-600 to-purple-600 hover:from-fuchsia-500 hover:to-purple-500 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Buat Ruang</button>
                                </div>
                            </div>

                            <div id="active-controls" class="hidden space-y-4">
                                <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                                    <label class="text-[9px] text-slate-500 uppercase block mb-1">ID Teks Anda</label>
                                    <div class="flex items-center justify-between">
                                        <span id="my-peer-id" class="font-mono text-xs font-bold text-cyan-400 tracking-wider">Menghubungkan...</span>
                                        <button onclick="copyId()" class="text-slate-400 hover:text-white"><i data-lucide="copy" class="w-4 h-4"></i></button>
                                    </div>
                                </div>

                                <div id="manual-dial-section" class="pt-2 border-t border-white/5">
                                    <label class="text-[9px] text-slate-500 uppercase block mb-1">Hubungi ID Teman</label>
                                    <div class="flex space-x-2">
                                        <input type="text" id="target-id" placeholder="Masukkan ID Teks..." 
                                            class="flex-1 bg-black/20 text-white text-xs p-3 rounded-xl border border-white/10 focus:outline-none">
                                        <button onclick="callPeer()" class="bg-fuchsia-600 p-3 rounded-xl hover:bg-fuchsia-500">
                                            <i data-lucide="phone" class="w-4 h-4 text-white"></i>
                                        </button>
                                    </div>
                                </div>

                                <button onclick="location.reload()" class="w-full border border-white/10 hover:bg-white/5 text-slate-400 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">
                                    Keluar Sesi
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="glass-morphism p-6 rounded-[2rem] flex-1 overflow-hidden flex flex-col min-h-0">
                        <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mb-4">Daftar Koneksi</h2>
                        <div id="connection-list" class="space-y-2 overflow-y-auto pr-2 flex-1">
                            <p class="text-[10px] text-slate-500 italic">Belum ada koneksi aktif...</p>
                        </div>
                    </div>
                </div>

                <!-- Area Utama: Grid Video -->
                <div class="flex-1 glass-morphism rounded-[2.5rem] border border-white/10 flex flex-col overflow-hidden relative">
                    <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-center p-8">
                        <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mb-4 border border-white/10">
                            <i data-lucide="video" class="w-8 h-8 text-slate-600"></i>
                        </div>
                        <h3 class="text-xl font-bold text-slate-400 font-heading">Siap untuk Terhubung?</h3>
                        <p class="text-[11px] text-slate-500 mt-2 max-w-xs uppercase tracking-wider leading-relaxed">Masukkan teks unik sebagai ID Anda, lalu klik 'Mulai Sesi'.</p>
                    </div>

                    <div id="video-container" class="video-grid hidden">
                        <!-- Tile video akan muncul di sini -->
                    </div>

                    <!-- Media Controls -->
                    <div id="media-controls" class="hidden absolute bottom-6 left-1/2 -translate-x-1/2 flex space-x-3 z-30">
                        <button id="toggle-mic" onclick="toggleMic()" class="p-4 rounded-2xl glass-morphism border border-white/10 text-white hover:bg-white/10 transition-all" title="Mikrofon">
                            <i data-lucide="mic" class="w-5 h-5"></i>
                        </button>
                        <button id="toggle-vid" onclick="toggleVideo()" class="p-4 rounded-2xl glass-morphism border border-white/10 text-white hover:bg-white/10 transition-all" title="Kamera">
                            <i data-lucide="video" class="w-5 h-5"></i>
                        </button>
                        <button id="toggle-hand" onclick="toggleHand()" class="p-4 rounded-2xl glass-morphism border border-white/10 text-white hover:bg-white/10 transition-all" title="Angkat Tangan">
                            <i data-lucide="hand" class="w-5 h-5"></i>
                        </button>
                        <button id="toggle-chat" onclick="toggleChat()" class="p-4 rounded-2xl glass-morphism border border-white/10 text-white hover:bg-white/10 transition-all relative" title="Obrolan">
                            <i data-lucide="message-square" class="w-5 h-5"></i>
                            <div id="chat-badge" class="absolute top-2 right-2 w-2 h-2 bg-fuchsia-500 rounded-full hidden"></div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel Obrolan (Sidebar Kanan) -->
        <aside id="chat-panel" class="fixed top-0 right-0 h-full w-80 glass-morphism z-50 flex flex-col border-l border-white/10">
            <div class="p-6 border-b border-white/10 flex items-center justify-between">
                <h2 class="text-[10px] font-black text-cyan-400 uppercase tracking-[0.4em]">Obrolan Grup</h2>
                <button onclick="toggleChat()" class="text-slate-400 hover:text-white">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Pesan muncul di sini -->
                <div class="text-center">
                    <p class="text-[10px] text-slate-500 italic">Selamat datang di obrolan aman P2P</p>
                </div>
            </div>

            <div class="p-4 border-t border-white/10">
                <form onsubmit="sendMessage(event)" class="flex space-x-2">
                    <input type="text" id="chat-input" placeholder="Ketik pesan..." 
                        class="flex-1 bg-black/20 text-white text-xs p-3 rounded-xl border border-white/10 focus:outline-none focus:border-cyan-500/50">
                    <button type="submit" class="bg-cyan-600 p-3 rounded-xl hover:bg-cyan-500 transition-colors">
                        <i data-lucide="send" class="w-4 h-4 text-white"></i>
                    </button>
                </form>
            </div>
        </aside>
    </div>

    <!-- Modal Password Admin -->
    <div id="password-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 backdrop-blur-sm transition-opacity">
        <div class="glass-morphism p-6 rounded-2xl w-80 border border-white/10 animate-pop">
            <h3 class="text-xs font-bold text-white uppercase tracking-widest mb-4 flex items-center gap-2">
                <i data-lucide="lock" class="w-4 h-4 text-fuchsia-500"></i> Otorisasi Admin
            </h3>
            <input type="password" id="admin-password" placeholder="Masukkan Password..." class="w-full bg-black/50 text-white text-sm p-3 rounded-xl border border-white/10 focus:outline-none focus:border-fuchsia-500 mb-4" onkeypress="if(event.key === 'Enter') verifyAdmin()">
            <div class="flex space-x-2">
                <button onclick="closePasswordModal()" class="flex-1 py-2 rounded-xl text-xs font-bold text-slate-400 hover:bg-white/5 transition-colors">Batal</button>
                <button onclick="verifyAdmin()" class="flex-1 bg-fuchsia-600 hover:bg-fuchsia-500 text-white py-2 rounded-xl text-xs font-bold transition-colors">Buka Akses</button>
            </div>
        </div>
    </div>

    <div id="notif" class="fixed bottom-8 left-1/2 -translate-x-1/2 glass-morphism px-6 py-3 rounded-2xl text-[10px] font-bold tracking-widest text-white opacity-0 transition-all pointer-events-none z-50 uppercase"></div>

    <script>
        let peer = null;
        let myStream = null;
        let myId = null;
        let myAlias = "";
        let calls = {};
        let dataConnections = {};
        let peerAliases = {}; // Map untuk menyimpan nama dari setiap PeerID
        let isHandRaised = false;
        let isAdminMode = false;
        
        // Status Mute Lock untuk peserta
        let isMuteLocked = false;
        // Tracking siapa saja yang sudah di-mute oleh Admin
        let mutedByAdmin = {}; 

        // --- Manajemen Modal & Mode Admin ---
        function promptAdmin() {
            document.getElementById('password-modal').classList.remove('hidden');
            document.getElementById('password-modal').classList.add('flex');
            document.getElementById('admin-password').focus();
        }

        function closePasswordModal() {
            document.getElementById('password-modal').classList.add('hidden');
            document.getElementById('password-modal').classList.remove('flex');
            document.getElementById('admin-password').value = '';
        }

        function verifyAdmin() {
            const pwd = document.getElementById('admin-password').value;
            if (pwd === 'mataharisaja') {
                closePasswordModal();
                isAdminMode = true;
                
                document.getElementById('btn-tab-user').className = "flex-1 text-slate-500 border-b-2 border-transparent pb-1 text-[10px] font-bold uppercase tracking-widest transition-colors hover:text-white";
                document.getElementById('btn-tab-admin').className = "flex-1 text-fuchsia-400 border-b-2 border-fuchsia-500 pb-1 text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-1 transition-colors";
                
                document.getElementById('user-form').classList.add('hidden');
                document.getElementById('admin-form').classList.remove('hidden');
                
                showNotif('Akses Admin Dibuka');
            } else {
                showNotif('Password Salah!');
            }
        }

        function setMode(mode) {
            if (mode === 'user') {
                isAdminMode = false;
                document.getElementById('btn-tab-user').className = "flex-1 text-cyan-400 border-b-2 border-cyan-500 pb-1 text-[10px] font-bold uppercase tracking-widest transition-colors";
                document.getElementById('btn-tab-admin').className = "flex-1 text-slate-500 border-b-2 border-transparent pb-1 text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-1 transition-colors hover:text-white";
                
                document.getElementById('admin-form').classList.add('hidden');
                document.getElementById('user-form').classList.remove('hidden');
            }
        }

        // 1a. Fungsi Buat Ruang (Khusus Admin)
        async function createRoom() {
            const nameInput = document.getElementById('admin-name').value.trim();
            const roomId = document.getElementById('admin-room-id').value.trim();
            
            if (!nameInput || !roomId) return showNotif("Isi Nama dan ID Ruang!");
            
            myAlias = nameInput.replace(/[^a-zA-Z0-9_\s]/g, '');
            if (myAlias.length < 2) return showNotif("Nama terlalu pendek!");

            const safeRoomId = roomId.replace(/[^a-zA-Z0-9_-]/g, '');
            if (safeRoomId.length < 3) return showNotif("ID Ruang minimal 3 karakter!");

            await initMediaAndPeer(safeRoomId, true);
        }

        // 1b. Fungsi Gabung Ruang (User Biasa)
        async function joinRoom() {
            const nameInput = document.getElementById('user-name').value.trim();
            const roomId = document.getElementById('room-id').value.trim();
            
            if (!nameInput || !roomId) return showNotif("Isi Nama dan ID Ruang!");
            
            myAlias = nameInput.replace(/[^a-zA-Z0-9_\s]/g, '');
            if (myAlias.length < 2) return showNotif("Nama terlalu pendek!");

            // Mencegah tumbukan ID (Collision) dengan menambah angka acak untuk User
            const randomSuffix = Math.floor(Math.random() * 10000);
            const safeUserId = myAlias.replace(/\s+/g, '-').toUpperCase() + '-' + randomSuffix;

            await initMediaAndPeer(safeUserId, false, roomId);
        }

        // Core Sistem - Inisiasi Media & Tampilan
        async function initMediaAndPeer(customId, isAdmin, targetRoomId = null) {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                initPeer(customId, isAdmin, targetRoomId);
                
                document.getElementById('init-form').classList.add('hidden');
                document.getElementById('active-controls').classList.remove('hidden');
                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('video-container').classList.remove('hidden');
                document.getElementById('media-controls').classList.remove('hidden');
                document.getElementById('connection-status').classList.remove('hidden');

                // Sembunyikan fitur telpon manual jika login sebagai User biasa
                if (!isAdmin) {
                    document.getElementById('manual-dial-section').classList.add('hidden');
                }

                addVideoTile('local', myStream, `${myAlias} (Anda)`, true);
                showNotif(isAdmin ? "Ruang Berhasil Dibuat" : "Mengakses Ruang...");
            } catch (err) {
                console.error(err);
                showNotif("Gagal Akses Kamera/Mic");
            }
        }

        // 2. Setup PeerJS
        function initPeer(customId, isAdmin, targetRoomId) {
            const peerConfig = {
                debug: 1,
                config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
            };

            peer = customId ? new Peer(customId, peerConfig) : new Peer(peerConfig);

            peer.on('open', (id) => {
                myId = id;
                document.getElementById('my-peer-id').innerText = id;

                // Jika user biasa, otomatis hubungi ID Admin setelah sistem Peer menyala
                if (!isAdmin && targetRoomId) {
                    connectToTarget(targetRoomId);
                }
            });

            // Menangani Panggilan Masuk (Media)
            peer.on('call', (call) => {
                const callerAlias = call.metadata?.alias || call.peer;
                peerAliases[call.peer] = callerAlias; // Simpan nama penelpon
                
                call.answer(myStream);
                handleCall(call);
            });

            // Menangani Koneksi Data Masuk (Chat/Signals)
            peer.on('connection', (conn) => {
                const senderAlias = conn.metadata?.alias || conn.peer;
                peerAliases[conn.peer] = senderAlias; // Simpan nama pengirim data
                
                handleDataConnection(conn);
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    showNotif("Nama sudah dipakai! Gunakan tambahan angka/karakter unik.");
                    setTimeout(() => location.reload(), 3000);
                } else {
                    showNotif(`Peer Error: ${err.type}`);
                }
            });
        }

        // 3. Menghubungi Teman (Media + Data)
        function callPeer() {
            const id = document.getElementById('target-id').value.trim();
            if (!id) return showNotif("Masukkan ID Teks Target!");
            connectToTarget(id);
            document.getElementById('target-id').value = "";
        }

        function connectToTarget(id) {
            if (id === myId) return showNotif("Tidak bisa menghubungi diri sendiri!");
            if (calls[id]) return; // Cegah panggil ulang jika sudah terhubung

            // Establish Data Connection first
            const conn = peer.connect(id, { metadata: { alias: myAlias } });
            handleDataConnection(conn);

            // Establish Media Call
            const call = peer.call(id, myStream, { metadata: { alias: myAlias } });
            handleCall(call);
        }

        // 4. Manajemen Panggilan Media
        function handleCall(call) {
            const peerId = call.peer;
            calls[peerId] = call;

            call.on('stream', (remoteStream) => {
                // Gunakan alias yang tersimpan dari metadata koneksi, jika tidak ada gunakan ID aslinya
                const displayName = peerAliases[peerId] || call.metadata?.alias || peerId;
                addVideoTile(peerId, remoteStream, displayName);
                updateConnectionList();
            });

            call.on('close', () => {
                removeVideoTile(peerId);
                delete calls[peerId];
                updateConnectionList();
            });

            call.on('error', () => {
                showNotif("Gagal video stream dengan " + peerId);
            });
        }

        // 5. Manajemen Koneksi Data (Chat & Signals)
        function handleDataConnection(conn) {
            const peerId = conn.peer;
            dataConnections[peerId] = conn;

            conn.on('open', () => {
                console.log("Koneksi data dibuka dengan " + peerId);
                
                // Siarkan nama/alias kita ke teman segera setelah koneksi data terbuka
                conn.send({ type: 'signal', action: 'identify', alias: myAlias });

                if (isHandRaised) {
                    conn.send({ type: 'signal', action: 'raise-hand', status: true });
                }

                // [FULL MESH LOGIC] Jika kita Admin dan ada koneksi baru, 
                // berikan daftar semua partisipan lainnya ke pengguna yang baru gabung ini
                if (isAdminMode) {
                    const existingPeers = Object.keys(dataConnections).filter(id => id !== peerId && dataConnections[id].open);
                    if (existingPeers.length > 0) {
                        conn.send({ type: 'signal', action: 'peer-list', peers: existingPeers });
                    }
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'chat') {
                    appendMessage(data.sender, data.text);
                    if (!document.getElementById('chat-panel').classList.contains('active')) {
                        document.getElementById('chat-badge').classList.remove('hidden');
                    }
                } else if (data.type === 'signal') {
                    if (data.action === 'raise-hand') {
                        updateHandIndicator(peerId, data.status);
                    } else if (data.action === 'identify') {
                        // Perbarui nama profil secara dinamis jika menerima broadcast identify
                        peerAliases[peerId] = data.alias;
                        const tileLabel = document.querySelector(`#tile-${peerId} .user-label`);
                        if (tileLabel) tileLabel.innerText = data.alias;
                        updateConnectionList();
                    } else if (data.action === 'peer-list') {
                        // [FULL MESH LOGIC] Jika menerima daftar peserta dari Admin, otomatis hubungi mereka semua
                        data.peers.forEach(targetId => {
                            if (targetId !== myId && !calls[targetId]) {
                                // Dijeda sedikit menggunakan timeout acak agar tidak terlalu membebani jaringan di detik yang sama
                                setTimeout(() => {
                                    connectToTarget(targetId);
                                }, Math.random() * 1500);
                            }
                        });
                    }
                } else if (data.type === 'admin-action') {
                    // Eksekusi jika menerima perintah dari admin
                    if (data.action === 'force-mute') {
                        isMuteLocked = true; // Kunci mic nyala
                        const track = myStream.getAudioTracks()[0];
                        if (track && track.enabled) {
                            track.enabled = false;
                        }
                        const btn = document.getElementById('toggle-mic');
                        btn.classList.add('bg-red-500/20', 'cursor-not-allowed');
                        btn.innerHTML = `<i data-lucide="mic-off" class="w-5 h-5"></i>`;
                        lucide.createIcons();
                        showNotif("Admin membisukan dan mengunci mikrofon Anda.");
                    } else if (data.action === 'allow-unmute') {
                        isMuteLocked = false; // Buka kunci mic
                        const btn = document.getElementById('toggle-mic');
                        btn.classList.remove('cursor-not-allowed');
                        showNotif("Admin telah membuka kunci mikrofon Anda.");
                    } else if (data.action === 'force-kick') {
                        showNotif("Anda telah dikeluarkan dari ruang oleh Admin.");
                        setTimeout(() => location.reload(), 2000); // Keluar otomatis
                    }
                }
            });

            conn.on('close', () => {
                delete dataConnections[peerId];
            });
        }

        // Fitur Kendali Bisu (Toggle) Admin pada Partisipan
        function adminToggleMute(peerId) {
            if (dataConnections[peerId] && dataConnections[peerId].open) {
                const btn = document.getElementById(`admin-mute-btn-${peerId}`);
                
                if (mutedByAdmin[peerId]) {
                    // Jika sudah dibisukan, Buka Kunci (Allow Unmute)
                    dataConnections[peerId].send({ type: 'admin-action', action: 'allow-unmute' });
                    mutedByAdmin[peerId] = false;
                    
                    if(btn) {
                        btn.classList.remove('bg-red-500', 'text-white');
                        btn.classList.add('text-slate-300', 'hover:bg-red-500/50', 'hover:text-white');
                        btn.title = 'Bisukan & Kunci Mic';
                        btn.innerHTML = `<i data-lucide="mic-off" class="w-3.5 h-3.5"></i>`;
                    }
                    showNotif("Kunci mikrofon peserta dibuka.");
                } else {
                    // Jika belum dibisukan, Kunci (Force Mute)
                    dataConnections[peerId].send({ type: 'admin-action', action: 'force-mute' });
                    mutedByAdmin[peerId] = true;
                    
                    if(btn) {
                        btn.classList.add('bg-red-500', 'text-white');
                        btn.classList.remove('text-slate-300', 'hover:bg-red-500/50', 'hover:text-white');
                        btn.title = 'Buka Kunci Mic';
                        btn.innerHTML = `<i data-lucide="mic" class="w-3.5 h-3.5"></i>`;
                    }
                    showNotif("Peserta dibisukan & mikrofon dikunci.");
                }
                lucide.createIcons();
            }
        }

        // Fitur Kick
        function adminKick(peerId) {
            if (dataConnections[peerId] && dataConnections[peerId].open) {
                dataConnections[peerId].send({ type: 'admin-action', action: 'force-kick' });
                showNotif("Peserta dikeluarkan.");
                
                // Putus koneksi secara paksa dari sisi Admin
                setTimeout(() => {
                    if (calls[peerId]) calls[peerId].close();
                    if (dataConnections[peerId]) dataConnections[peerId].close();
                    removeVideoTile(peerId);
                    delete calls[peerId];
                    delete dataConnections[peerId];
                    updateConnectionList();
                }, 500);
            }
        }

        // 6. Fitur Chat
        function toggleChat() {
            const panel = document.getElementById('chat-panel');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                document.getElementById('chat-badge').classList.add('hidden');
            }
            lucide.createIcons();
        }

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            const msgData = {
                type: 'chat',
                sender: myAlias, // Menggunakan nama profil yang benar
                text: text
            };

            // Kirim ke semua orang
            Object.values(dataConnections).forEach(conn => {
                if (conn.open) conn.send(msgData);
            });

            appendMessage("Anda", text);
            input.value = "";
        }

        function appendMessage(sender, text) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            const isMe = sender === "Anda";
            
            div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
            div.innerHTML = `
                <span class="text-[8px] font-bold text-slate-500 uppercase mb-1">${sender}</span>
                <div class="${isMe ? 'bg-cyan-600 text-white' : 'bg-white/10 text-slate-200'} px-3 py-2 rounded-2xl text-xs max-w-[90%] shadow-lg">
                    ${text}
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // 7. Fitur Angkat Tangan (Raise Hand)
        function toggleHand() {
            isHandRaised = !isHandRaised;
            const btn = document.getElementById('toggle-hand');
            
            btn.classList.toggle('bg-yellow-500/20', isHandRaised);
            btn.classList.toggle('text-yellow-400', isHandRaised);
            
            updateHandIndicator('local', isHandRaised);

            // Broadcast ke semua teman
            Object.values(dataConnections).forEach(conn => {
                if (conn.open) {
                    conn.send({
                        type: 'signal',
                        action: 'raise-hand',
                        status: isHandRaised
                    });
                }
            });

            showNotif(isHandRaised ? "Tangan Diangkat" : "Tangan Diturunkan");
        }

        function updateHandIndicator(id, status) {
            const tile = document.getElementById(`tile-${id}`);
            if (tile) {
                const indicator = tile.querySelector('.hand-indicator');
                if (indicator) {
                    indicator.style.display = status ? 'flex' : 'none';
                }
            }
        }

        // 8. UI Helpers
        function addVideoTile(id, stream, label, isLocal = false) {
            const container = document.getElementById('video-container');
            if (document.getElementById(`tile-${id}`)) return;

            const tile = document.createElement('div');
            tile.id = `tile-${id}`;
            tile.className = `video-tile animate-pop ${isLocal ? 'border-2 border-cyan-500/40' : ''}`;
            
            // Tambahkan kontrol Admin jika pengguna saat ini adalah Admin, dan tile tersebut BUKAN tile lokal
            const isMuted = mutedByAdmin[id] || false;
            const adminControlsHTML = (!isLocal && isAdminMode) ? `
                <div class="absolute top-2 left-2 z-20 flex space-x-1 bg-black/60 p-1 rounded-lg backdrop-blur-md border border-white/10">
                    <button id="admin-mute-btn-${id}" onclick="adminToggleMute('${id}')" class="p-1.5 ${isMuted ? 'bg-red-500 text-white' : 'text-slate-300 hover:bg-red-500/50 hover:text-white'} rounded-md transition-colors" title="${isMuted ? 'Buka Kunci Mic' : 'Bisukan & Kunci Mic'}">
                        <i data-lucide="${isMuted ? 'mic' : 'mic-off'}" class="w-3.5 h-3.5"></i>
                    </button>
                    <button onclick="adminKick('${id}')" class="p-1.5 hover:bg-red-500/50 hover:text-white text-slate-300 rounded-md transition-colors" title="Keluarkan Peserta">
                        <i data-lucide="user-minus" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            ` : '';

            tile.innerHTML = `
                <div class="hand-indicator items-center justify-center">
                    <i data-lucide="hand" class="w-4 h-4"></i>
                </div>
                ${adminControlsHTML}
                <video id="video-${id}" autoplay playsinline ${isLocal ? 'muted' : ''}></video>
                <div class="user-label text-white uppercase tracking-tighter">${label}</div>
            `;
            container.appendChild(tile);
            document.getElementById(`video-${id}`).srcObject = stream;
            lucide.createIcons();
            refreshGrid();
        }

        function removeVideoTile(id) {
            const tile = document.getElementById(`tile-${id}`);
            if (tile) {
                tile.remove();
                refreshGrid();
            }
        }

        // [BARU] Fungsi menghitung ulang ukuran dan posisi Grid berdasarkan jumlah partisipan
        function refreshGrid() {
            const container = document.getElementById('video-container');
            const count = container.childElementCount;
            const tiles = container.querySelectorAll('.video-tile');
            
            // Menentukan lebar dasar box (flex-basis) agar dapat responsif seiring bertambahnya peserta
            let basis = '100%';
            if (count === 2) basis = 'calc(50% - 0.5rem)';
            else if (count >= 3 && count <= 4) basis = 'calc(50% - 0.5rem)';
            else if (count >= 5 && count <= 6) basis = 'calc(33.33% - 0.67rem)';
            else if (count >= 7 && count <= 9) basis = 'calc(33.33% - 0.67rem)';
            else if (count >= 10 && count <= 16) basis = 'calc(25% - 0.75rem)';
            else if (count > 16) basis = 'calc(20% - 0.8rem)';
            
            tiles.forEach(tile => {
                tile.style.flexBasis = basis;
                tile.style.maxWidth = basis;
            });
        }

        function updateConnectionList() {
            const list = document.getElementById('connection-list');
            const activeIds = Object.keys(calls);
            if (activeIds.length === 0) {
                list.innerHTML = `<p class="text-[10px] text-slate-500 italic">Belum ada koneksi aktif...</p>`;
                return;
            }
            list.innerHTML = activeIds.map(id => `
                <div class="flex items-center justify-between bg-white/5 p-3 rounded-xl border border-white/5 animate-fade-in">
                    <span class="text-[10px] font-bold text-white/70 uppercase tracking-widest truncate max-w-[150px]">${peerAliases[id] || id}</span>
                    <div class="w-2 h-2 bg-fuchsia-400 rounded-full"></div>
                </div>
            `).join('');
        }

        function toggleMic() {
            // Cegah toggle jika di-lock oleh admin
            if (isMuteLocked) {
                showNotif("Mikrofon dikunci oleh Admin!");
                return;
            }

            const track = myStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            const btn = document.getElementById('toggle-mic');
            btn.classList.toggle('bg-red-500/20', !track.enabled);
            btn.innerHTML = `<i data-lucide="${track.enabled ? 'mic' : 'mic-off'}" class="w-5 h-5"></i>`;
            lucide.createIcons();
        }

        function toggleVideo() {
            const track = myStream.getVideoTracks()[0];
            track.enabled = !track.enabled;
            const btn = document.getElementById('toggle-vid');
            btn.classList.toggle('bg-red-500/20', !track.enabled);
            btn.innerHTML = `<i data-lucide="${track.enabled ? 'video' : 'video-off'}" class="w-5 h-5"></i>`;
            lucide.createIcons();
        }

        function copyId() {
            const id = document.getElementById('my-peer-id').innerText;
            const el = document.createElement('textarea');
            el.value = id;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showNotif("ID Disalin!");
        }

        function showNotif(text) {
            const n = document.getElementById('notif');
            n.innerText = text;
            n.style.opacity = "1";
            n.style.transform = "translate(-50%, -10px)";
            setTimeout(() => {
                n.style.opacity = "0";
                n.style.transform = "translate(-50%, 0)";
            }, 3000);
        }

        lucide.createIcons();
    </script>
</body>
</html>
